version: "3.9"

services:

  db:
    image: postgres:15
    container_name: querysmith_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: querysmith
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: querysmith_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    #env_file:
    #- ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/querysmith